<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Video URL List</title>
<style>
body{
    font-family: Arial;
    padding:20px;
}
textarea{
    width:100%;
    height:400px;
}
button{
    padding:10px 20px;
    margin-top:10px;
}
</style>
</head>

<body>

<h2>Video URLs</h2>

<button onclick="copyUrls()">Copy All</button>

<br><br>

<textarea id="output"></textarea>

<script>

const username = "YOUR_USERNAME"
const repo = "YOUR_REPO"
const folder = "videos"

const api = `https://api.github.com/repos/${username}/${repo}/contents/${folder}`

fetch(api)
.then(res => res.json())
.then(data => {

    let urls = data
        .filter(file => file.type === "file")
        .map(file =>
        `https://cdn.jsdelivr.net/gh/${username}/${repo}/${folder}/${file.name}`
        )

    document.getElementById("output").value = urls.join("\n")

})

function copyUrls(){
    const text = document.getElementById("output")
    text.select()
    document.execCommand("copy")
    alert("Copied!")
}

</script>

</body>
</html>
