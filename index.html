<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Media URL Extractor</title>

<style>
body{
font-family:Arial;
padding:20px;
background:#111;
color:white;
}

textarea{
width:100%;
height:400px;
margin-top:20px;
background:#222;
color:#0f0;
padding:10px;
}

button{
padding:10px 20px;
font-size:16px;
cursor:pointer;
}
</style>

</head>

<body>

<h2>Media URL Generator</h2>

<button onclick="loadFiles()">Load URLs</button>

<textarea id="output"></textarea>

<script>

const owner = "HuuHuy12A2"
const repo = "videos"
const branch = "main"

const folders = "videos assets"

async function loadFiles(){

let allUrls = []

for (let folder of folders){

let api =
`https://api.github.com/repos/${owner}/${repo}/contents/${folder}`

let res = await fetch(api)
let data = await res.json()

data.forEach(file => {

let url =
`https://cdn.jsdelivr.net/gh/${owner}/${repo}@${branch}/${folder}/${file.name}`

allUrls.push(url)

})

}

document.getElementById("output").value =
allUrls.join("\n")

}

</script>

</body>
</html>
